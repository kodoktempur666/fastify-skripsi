global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "express-app"
    static_configs:
      - targets: ["app:3000"]
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
  - job_name: "fastify-app"
    static_configs:
      - targets: ["app:3005"]
  - job_name: "express-app-grpc"
    static_configs:
      - targets: ["app:3010"]
  - job_name: "fastify-app-grpc"
    static_configs:
      - targets: ["app:3015"]